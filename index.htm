<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Avant-première Produit | Concept 3D</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #0f0f12;
    color: #eee;
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* ---------- LOGIN SCREEN ---------- */
  #login-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(circle at 50% 20%, #1c1c22 0%, #0b0b0e 70%);
    z-index: 10;
  }

  .login-card {
    width: 100%;
    max-width: 360px;
    background: #17171b;
    border: 1px solid #26262c;
    border-radius: 18px;
    padding: 32px 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    animation: fadeUp .5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-card h1 {
    font-size: 1.3em;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .login-card p.sub {
    text-align: center;
    color: #8a8a92;
    font-size: 0.82em;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 26px;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 0.78em;
    color: #9a9aa2;
    margin-bottom: 6px;
    letter-spacing: 0.4px;
  }

  .field input {
    width: 100%;
    padding: 13px 14px;
    font-size: 16px; /* évite le zoom auto iOS */
    border-radius: 10px;
    border: 1px solid #2c2c33;
    background: #0f0f12;
    color: #f2f2f2;
    outline: none;
    transition: border-color .2s;
  }

  .field input:focus {
    border-color: #6c6cff;
  }

  #login-btn {
    width: 100%;
    padding: 14px;
    margin-top: 6px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #6c6cff, #8a5cf7);
    color: #fff;
    font-size: 1em;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }

  #login-btn:active { transform: scale(0.98); }

  #login-error {
    color: #ff6b6b;
    font-size: 0.82em;
    text-align: center;
    min-height: 18px;
    margin-top: 12px;
  }

  /* ---------- MAIN CONTENT ---------- */
  #app {
    display: none;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 20px 16px 40px;
  }

  header { text-align: center; margin-bottom: 24px; padding-top: 6px; }

  h1.title {
    font-weight: 300;
    letter-spacing: 1px;
    color: #f5f5f5;
    font-size: 1.5em;
    margin-bottom: 8px;
  }

  .tagline {
    color: #9a9aa2;
    font-size: 0.78em;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .preview-container {
    width: 100%;
    max-width: 600px;
    background: #17171b;
    padding: 8px;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    border: 1px solid #26262c;
  }

  .preview-label {
    font-size: 0.75em;
    color: #8a8a92;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 4px 4px 8px;
  }

  .iframe-wrapper {
    position: relative;
    padding-bottom: 100%;
    height: 0;
    overflow: hidden;
    border-radius: 10px;
    background: #0b0b0e;
  }

  .iframe-wrapper iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* ---------- IMAGE GALLERY ---------- */
  .image-gallery {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .image-gallery figure {
    margin: 0;
    background: #0b0b0e;
    border-radius: 10px;
    overflow: hidden;
  }

  .image-gallery img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  @media (max-width: 420px) {
    .image-gallery {
      grid-template-columns: 1fr;
    }
  }

  #logout-btn {
    margin-top: 22px;
    background: none;
    border: 1px solid #2c2c33;
    color: #9a9aa2;
    padding: 9px 18px;
    border-radius: 20px;
    font-size: 0.8em;
    cursor: pointer;
    transition: background .2s, color .2s;
  }
  #logout-btn:active { background: #1c1c22; color: #eee; }

  footer {
    margin-top: 30px;
    font-size: 0.75em;
    color: #55555c;
    text-align: center;
  }

  /* Small phones */
  @media (max-width: 380px) {
    .login-card { padding: 26px 18px; }
    h1.title { font-size: 1.3em; }
  }
</style>
</head>
<body>

  <!-- ÉCRAN DE CONNEXION -->
  <div id="login-screen">
    <div class="login-card">
      <h1>Accès privé</h1>
      <p class="sub">Concept Preview</p>

      <div class="field">
        <label for="user-id">Identifiant</label>
        <input id="user-id" type="text" autocomplete="username" autocapitalize="none" autocorrect="off" inputmode="text">
      </div>

      <div class="field">
        <label for="user-pass">Mot de passe</label>
        <input id="user-pass" type="password" autocomplete="current-password">
      </div>

      <button id="login-btn">Se connecter</button>
      <div id="login-error"></div>
    </div>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div id="app">
    <header>
      <h1 class="title">Concept Preview</h1>
      <p class="tagline">Découverte exclusive</p>
    </header>

    <div class="preview-container">
      <p class="preview-label">Concept 1</p>
      <div class="iframe-wrapper">
        <iframe
          title="Aperçu 3D du Produit 1"
          allowfullscreen
          loading="lazy"
          src="https://www.pacdora.com/fr/share?filter_url=psx67osl3i">
        </iframe>
      </div>
    </div>

    <div class="preview-container" style="margin-top: 20px;">
      <p class="preview-label">Concept 2</p>
      <div class="iframe-wrapper">
        <iframe
          title="Aperçu 3D du Produit 2"
          allowfullscreen
          loading="lazy"
          src="https://www.pacdora.com/fr/share?filter_url=psge89sq34">
        </iframe>
      </div>
    </div>

    <div class="preview-container" style="margin-top: 20px;">
      <p class="preview-label">Visuels Produit</p>
      <div class="image-gallery">
        <figure>
          <img src="tshirtover.png" alt="T-shirt oversize - dos">
        </figure>
        <figure>
          <img src="pullover.png" alt="Pull oversize - dos">
        </figure>
      </div>
    </div>

    <div class="preview-container" style="margin-top: 20px;">
      <p class="preview-label">Concept 4</p>
      <div class="iframe-wrapper">
        <iframe
          title="Aperçu 3D du Produit 4"
          allowfullscreen
          loading="lazy"
          src="https://www.pacdora.com/fr/share?filter_url=psv420ehjt">
        </iframe>
      </div>
    </div>

    <div class="preview-container" style="margin-top: 20px;">
      <p class="preview-label">Maillot</p>
      <div class="image-gallery">
        <figure>
          <img src="maillotf.png" alt="Maillot - face">
        </figure>
        <figure>
          <img src="maillotd.png" alt="Maillot - dos">
        </figure>
      </div>
    </div>

    <div class="preview-container" style="margin-top: 20px;">
      <p class="preview-label">Concept 5</p>
      <div class="iframe-wrapper">
        <iframe
          title="Aperçu 3D du Produit 5"
          allowfullscreen
          loading="lazy"
          src="https://www.pacdora.com/fr/share?filter_url=psvpe46r0d">
        </iframe>
      </div>
    </div>

    <div class="preview-container" style="margin-top: 20px;">
      <p class="preview-label">Polo</p>
      <div class="image-gallery">
        <figure>
          <img src="poloover.png" alt="Polo oversize">
        </figure>
      </div>
    </div>

    <button id="logout-btn">Déconnexion</button>

    <footer>&copy; 2026 Innovation Product Concept</footer>
  </div>

  <script>
    // Comptes autorisés (accès restreint simple, usage privé)
    const USERS = {
      "ifofana": "projetwear",
      "hsow": "projetwear"
    };

    const loginScreen = document.getElementById('login-screen');
    const app = document.getElementById('app');
    const idInput = document.getElementById('user-id');
    const passInput = document.getElementById('user-pass');
    const errorBox = document.getElementById('login-error');

    function tryLogin() {
      const id = idInput.value.trim();
      const pass = passInput.value;

      if (USERS[id] && USERS[id] === pass) {
        loginScreen.style.display = 'none';
        app.style.display = 'flex';
        errorBox.textContent = '';
      } else {
        errorBox.textContent = "Identifiant ou mot de passe incorrect.";
        passInput.value = '';
        passInput.focus();
      }
    }

    document.getElementById('login-btn').addEventListener('click', tryLogin);

    [idInput, passInput].forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') tryLogin();
      });
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      app.style.display = 'none';
      loginScreen.style.display = 'flex';
      idInput.value = '';
      passInput.value = '';
      idInput.focus();
    });
  </script>

</body>
</html>
